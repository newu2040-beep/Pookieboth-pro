
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#fff5f0" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PookieBoth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      
      /* Animation Utilities */
      .fade-enter {
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.96) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      .animate-pop {
        animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }

      .animate-slide-up {
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }

      /* The Pookie Bounce - Refined for micro-interactions */
      .btn-bouncy {
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s ease, filter 0.2s ease;
      }
      .btn-bouncy:active {
        transform: scale(0.9) !important;
      }
      .btn-bouncy:hover {
        transform: scale(1.05);
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      
      .font-hand {
        font-family: 'Pacifico', cursive;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              peach: { 50: '#fff7f2', 100: '#ffedd5', 500: '#fb923c', 900: '#7c2d12' },
              mint: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 900: '#14532d' },
              lavender: { 50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6', 900: '#4c1d95' },
              babyblue: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 900: '#1e3a8a' },
              blush: { 50: '#fff1f2', 100: '#ffe4e6', 500: '#f43f5e', 900: '#881337' },
            },
            animation: {
              'shimmer': 'shimmer 2s linear infinite',
              'float': 'float 3s ease-in-out infinite',
              'bounce-gentle': 'bounce-gentle 2s ease-in-out infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '-1000px 0' },
                '100%': { backgroundPosition: '1000px 0' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-8px)' },
              },
              'bounce-gentle': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-5px)' },
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "uuid": "https://esm.sh/uuid@^13.0.0",
    "qrcode": "https://esm.sh/qrcode@^1.5.3",
    "firebase/": "https://esm.sh/firebase@^12.9.0/",
    "react-easy-crop": "https://esm.sh/react-easy-crop@5.0.0",
    "tslib": "https://esm.sh/tslib@2.6.0"
  }
}
</script>
</head>
  <body class="bg-gray-50 h-screen w-screen overflow-hidden select-none">
    <div id="root" class="h-full w-full"></div>
  </body>
</html>
